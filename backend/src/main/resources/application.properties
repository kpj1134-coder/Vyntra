server.port=${PORT:8091}
spring.application.name=vyntra-backend

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/vyntra_db}

# JWT
app.jwt.secret=${JWT_SECRET:vyntra-super-secret-key-please-change-in-production}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:5174,http://localhost:3000,https://frontend-gray-nine-bn4q3k0wd5.vercel.app,https://vyntra-backend-l96w.onrender.com}

# Gemini AI API
gemini.api.key=${GEMINI_API_KEY:AIzaSyCkkfQlKcfhpJOgGAXo7F_s2Be75c2asBg}
gemini.model=gemini-2.0-flash

# SerpAPI (optional - falls back to Overpass if demo)
serpapi.key=${SERPAPI_KEY:demo}

# OpenWeatherMap (optional)
weather.api.key=${WEATHER_API_KEY:demo}

# Logging
logging.level.com.vyntra=DEBUG
logging.level.org.springframework.security=WARN

# Jackson
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# WebClient timeout
spring.webflux.client.timeout=30000