# ==========================================
# VYNTRA - Adaptive Travel Intelligence System
# ==========================================

# ===============================
# SERVER
# ===============================
server.port=${PORT:8091}
spring.application.name=vyntra-backend

# ===============================
# MONGODB
# ===============================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/vyntra_db}

# ===============================
# JWT CONFIG (IMPORTANT ⚠️)
# ===============================
app.jwt.secret=${JWT_SECRET:vyntra-super-secret-key-please-change-this-in-production}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# EXTERNAL APIs (OPTIONAL)
# ===============================
serpapi.key=${SERPAPI_KEY:demo}
weather.api.key=${WEATHER_API_KEY:demo}
ai.api.key=${AI_API_KEY:demo}
ai.provider=${AI_PROVIDER:gemini}

# ===============================
# CORS CONFIG (VERY IMPORTANT)
# ===============================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# ===============================
# LOGGING
# ===============================
logging.level.com.vyntra=DEBUG
logging.level.org.springframework.security=WARN

# ===============================
# JACKSON (OPTIONAL)
# ===============================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false